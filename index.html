<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">
        <h1>Smart Task Manager</h1>

        <!-- Input Section -->
        <div class="input-section">
            <input type="text" id="input" placeholder="Add your task...">
            <button id="addbtn">Add</button>
        </div>

        <!-- Filter Buttons -->
        <div class="filters">
            <button onclick="renderTodos('all')">All</button>
            <button onclick="renderTodos('completed')">Completed</button>
            <button onclick="renderTodos('pending')">Pending</button>
        </div>

        <!-- Task List -->
        <ul id="list"></ul>
    </div>

    <script src="index.js"></script>
</body>
</html>
